conky.config = {
  background = true,
  update_interval = 1,

  cpu_avg_samples = 2,
  net_avg_samples = 2,
  temperature_unit = 'celsius',
  if_up_strictness = 'address',

  double_buffer = true,
  no_buffers = true,
  text_buffer_size = 2048,

  own_window = true,
  own_window_class = 'conky',
  own_window_type = 'override',
  own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager,below',

  --own_window_colour = '#555555',
  own_window_transparent = true,
  own_window_argb_visual = true,
  own_window_argb_value = 0,

  draw_shades = false,
  draw_outline = false,
  draw_borders = false,
  draw_graph_borders = false,

  alignment = 'top_left',
	gap_x = 50,
	gap_y = 40,
  minimum_width = 520,
  minimum_height = 700,
  maximum_width = 540,
  border_inner_margin = 0,
  border_outer_margin = 20,
  --xinerama_head = 0,

  override_utf8_locale = true,
  use_xft = true,
  font = 'monospace:size=11',
  xftalpha = 0.8,
  uppercase = false,

  -- Defining colors
  default_color = '#FFFFFF',
  -- Shades of Gray
  color1 = '#DDDDDD',
  color2 = '#AAAAAA',
  color3 = '#FFFFFF',
  color4 = '#808080',
  color5 = '#EF5A29',
  color6 = '#dc143c',
  color7 = '#b2c8d8',
  color8 = '#697987',
  color9 = '#2d3b41',

}
conky.text = [[
# focused_workspace background #16a085 to #5D7B86
#                     border  backgr. text
# focused_workspace  #F9FAF9 #16a085 #292F34
${image /usr/share/icons/garuda/garuda-orange.png -p 50,20 -s 78x59  -f 5}${font sans mono:size=13}${alignr}${color6}${alignc}
${alignr}${font sans mono:size=20}${color1}${time %T}${color}
${alignr}${font sans mono:size=12}${color1}${time %a %d-%b-%Y}${color}
${color1} ${font}
 ${alignr}${color3}${color}
${goto 12}+===========================================================+
${goto 12}${color1}+----System ${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}+-- ${color3}OS:${alignr}${color6}${execi 130000 awk -F= '/DESCRIPTION=/{print $2}' /etc/lsb-release}${color}
${goto 15}|${goto 38}+-- ${color3}Kernel:${alignr}${color6}${kernel}${color}
${goto 15}|${goto 38}+-- ${color3}User:${alignr}${color6}${execi 11003 whoami}${color}
${goto 15}|${goto 38}+-- ${color3}Node:${alignr}${color6}${nodename}${font}${color}
${goto 15}|${goto 38}+-- ${color3}IP:${alignr}${color6}${addr enp5s0}${font}${color}
#${goto 15}|${goto 38}+-- ${color3}Machine:${alignr}${color6}${machine}${color}
${goto 15}|${goto 38}+-- ${color3}Uptime:${alignr}${color6}${uptime_short}${color}
${goto 15}|
${goto 12}${color1}+----Status${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}${color1}+-- Network [up/down]${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}enp5s0${alignr}${color6}${upspeed enp5s0}/${downspeed enp5s0}${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}${color1}+-- Cpu - ${color6}${cpu cpu0}% / ${execi 10 sensors | grep 'Composite' | awk {'print $2'}}${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}Load${alignr}${color6}${loadavg}${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}+-- ${color1}Mem - ${color6}(${memperc}%) ${mem} / ${memfree} / ${memmax}${color}
#${goto 15}|${goto 40}|
#${goto 15}|${goto 38}+-- ${membar 10,50}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}${color1}+-- Storage${color}
${goto 15}|${goto 40}|${goto 60}+-- /${alignr}${color6}(${fs_used_perc}%) ${fs_used /}/${fs_free /}/${fs_size /}${color}
${goto 15}|${goto 40}|${goto 60}+-- /bd1${alignr}${color6}(${fs_used_perc /bd1}%) ${fs_used /bd1}/${fs_free /bd1}/${fs_size /bd1}${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}${color1}+-- DiskIO [r/w]${color}
${goto 15}|${goto 40}|${goto 60}+-- /dev/nvme0n1p2:${alignr}${color6}${diskio_read /dev/nvme0n1p2}/${diskio_write /dev/nvme0n1p2}${color}
${goto 15}|${goto 40}|${goto 60}+-- /dev/sda1:${alignr}${color6}${diskio_read /dev/nvme0n1p2}/${diskio_write /dev/nvme0n1p2}${color}
${goto 15}|${goto 40}|
${goto 12}${color1}+----Processes - ${color6}${running_processes} / ${processes}${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}+-- ${color1}Cpu${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}${top name 1}${alignr}${color6}${top cpu 1}${top mem 1}${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}${top name 2}${alignr}${color6}${top cpu 2}${top mem 2}${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}${top name 3}${alignr}${color6}${top cpu 3}${top mem 3}${color}
${goto 15}|${goto 40}|
${goto 15}|${goto 38}+-- ${color1}Mem${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}${top_mem name 1}${alignr}${color6}${top_mem cpu 1}${top_mem mem 1}${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}${top_mem name 2}${alignr}${color6}${top_mem cpu 2}${top_mem mem 2}${color}
${goto 15}|${goto 40}|${goto 60}+-- ${color3}${top_mem name 3}${alignr}${color6}${top_mem cpu 3}${top_mem mem 3}${color}
${goto 15}|
${goto 12}+===========================================================+

]];
